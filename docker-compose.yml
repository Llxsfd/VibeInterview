services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: llx123123
      POSTGRES_DB: smart_interview_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    image: python:3.12-slim
    working_dir: /app/back
    command: sh -c "pip install -r requirements.txt && python scripts/bootstrap_db.py --skip-create-database && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:llx123123@postgres:5432/smart_interview_platform
      POSTGRES_ADMIN_URL: postgresql+psycopg2://postgres:llx123123@postgres:5432/postgres
      JWT_SECRET_KEY: docker-local-change-me
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:20-alpine
    working_dir: /app/front
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      - backend

  celery_worker:
    image: python:3.12-slim
    working_dir: /app/back
    command: sh -c "pip install -r requirements.txt && celery -A app.workers.tasks worker --loglevel=info"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:llx123123@postgres:5432/smart_interview_platform
    volumes:
      - .:/app
    depends_on:
      - redis
      - backend

volumes:
  postgres_data:
